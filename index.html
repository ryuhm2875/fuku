<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>류현민과 응급조치 · 후쿠오카 여행 취향 조사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface2: #F2F1EE;
    --primary: #1A1A1A;
    --secondary: #6B6B6B;
    --muted: #AEAEAE;
    --accent: #3D5AFE;
    --accent-light: #EEF1FF;
    --border: #E8E8E6;
    --selected-bg: #EEF1FF;
    --selected-border: #3D5AFE;
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --font: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg);
    color: var(--primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    transform: translateX(30px);
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .screen.exit-left {
    opacity: 0;
    transform: translateX(-30px);
    pointer-events: none;
  }

  /* ===== INTRO ===== */
  #intro {
    background: var(--surface);
    justify-content: center;
    align-items: center;
    padding: 40px 32px;
    gap: 0;
  }

  .intro-pill {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 28px;
  }

  .intro-icon {
    font-size: 52px;
    margin-bottom: 20px;
    line-height: 1;
  }

  .intro-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.35;
    text-align: center;
    color: var(--primary);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }

  .intro-sub {
    font-size: 15px;
    color: var(--secondary);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 48px;
  }

  .intro-meta {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
  }

  .intro-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .intro-meta-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.03em;
  }

  .intro-meta-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .intro-divider {
    width: 1px;
    height: 36px;
    background: var(--border);
    align-self: center;
  }

  /* ===== SURVEY ===== */
  #survey {
    background: var(--bg);
    overflow: hidden;
  }

  .survey-header {
    background: var(--surface);
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .survey-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .survey-count {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .survey-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .survey-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px 32px;
    overscroll-behavior: contain;
  }

  .q-category {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 14px;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--primary);
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
    -webkit-user-select: none;
  }

  .option-card:active {
    transform: scale(0.985);
  }

  .option-card.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
  }

  .option-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
  }

  .option-card.selected .option-radio {
    border-color: var(--accent);
    background: var(--accent);
  }

  .option-radio::after {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.18s ease;
  }

  .option-card.selected .option-radio::after {
    opacity: 1;
  }

  .option-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--primary);
    line-height: 1.4;
  }

  .option-card.selected .option-text {
    color: var(--accent);
  }

  .option-emoji {
    font-size: 18px;
    flex-shrink: 0;
  }

  .survey-footer {
    background: var(--surface);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ===== TEXTAREA (Q20) ===== */
  .textarea-wrap {
    position: relative;
  }

  textarea.free-input {
    width: 100%;
    min-height: 120px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 15px;
    color: var(--primary);
    resize: none;
    outline: none;
    transition: border-color 0.18s ease;
    line-height: 1.6;
  }

  textarea.free-input:focus {
    border-color: var(--accent);
  }

  textarea.free-input::placeholder {
    color: var(--muted);
  }

  /* ===== BUTTONS ===== */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    padding: 17px;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: -0.01em;
  }

  .btn-primary:active {
    transform: scale(0.98);
    background: #2a47e0;
  }

  .btn-primary:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* ===== RESULT ===== */
  #result {
    background: var(--bg);
    overflow: hidden;
  }

  .result-header {
    background: var(--surface);
    padding: 32px 24px 28px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .result-icon {
    font-size: 44px;
    margin-bottom: 14px;
  }

  .result-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .result-sub {
    font-size: 14px;
    color: var(--secondary);
    line-height: 1.6;
  }

  .result-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px;
    overscroll-behavior: contain;
  }

  .result-section {
    margin-bottom: 16px;
  }

  .result-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .result-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .result-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-item:last-child {
    border-bottom: none;
  }

  .result-q {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .result-a {
    font-size: 15px;
    font-weight: 600;
    color: var(--primary);
    line-height: 1.4;
  }

  .result-footer {
    background: var(--surface);
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-copy {
    flex: 1;
    background: var(--surface2);
    color: var(--primary);
    border: none;
    border-radius: var(--radius-md);
    padding: 16px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .btn-copy:active {
    transform: scale(0.98);
    background: var(--border);
  }

  .btn-copy.copied {
    background: #E8F5E9;
    color: #2E7D32;
  }

  .btn-restart {
    background: var(--surface2);
    color: var(--secondary);
    border: none;
    border-radius: var(--radius-md);
    padding: 16px 20px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }

  .btn-restart:active {
    transform: scale(0.98);
  }

  /* scrollbar */
  .survey-body::-webkit-scrollbar,
  .result-body::-webkit-scrollbar { display: none; }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --surface: #1C1C1E;
      --surface2: #2C2C2E;
      --primary: #F5F5F5;
      --secondary: #AEAEB2;
      --muted: #636366;
      --border: #2C2C2E;
      --accent-light: #1A2147;
      --selected-bg: #1A2147;
    }
    textarea.free-input {
      background: var(--surface);
      color: var(--primary);
    }
    textarea.free-input::placeholder { color: var(--muted); }
    .btn-copy.copied { background: #1B3A1C; color: #69B46C; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- INTRO -->
  <div class="screen active" id="intro">
    <div class="intro-pill">✈️ 2026 · 후쿠오카 여행</div>
    <div class="intro-icon">🇯🇵</div>
    <h1 class="intro-title">류현민과 응급조치<br>여행 취향 조사</h1>
    <p class="intro-sub">8월 2일~4일 후쿠오카 여행을<br>더 완벽하게 준비하기 위한 설문이에요</p>
    <div class="intro-meta">
      <div class="intro-meta-item">
        <span class="intro-meta-num">20</span>
        <span class="intro-meta-label">질문</span>
      </div>
      <div class="intro-divider"></div>
      <div class="intro-meta-item">
        <span class="intro-meta-num">3분</span>
        <span class="intro-meta-label">소요</span>
      </div>
      <div class="intro-divider"></div>
      <div class="intro-meta-item">
        <span class="intro-meta-num">3일</span>
        <span class="intro-meta-label">여행</span>
      </div>
    </div>
    <div style="width:100%;max-width:320px;margin-bottom:16px;">
      <input type="text" id="user-name" placeholder="내 이름을 입력해줘 (예: 홍길동)"
        style="width:100%;padding:16px 18px;border:1.5px solid var(--border);border-radius:16px;font-family:var(--font);font-size:16px;font-weight:500;color:var(--primary);background:var(--surface2);outline:none;text-align:center;"
        oninput="document.getElementById('start-btn').disabled=this.value.trim().length===0"
      >
    </div>
    <button class="btn-primary" id="start-btn" onclick="startSurvey()" style="max-width:320px;" disabled>시작하기 →</button>
  </div>

  <!-- SURVEY -->
  <div class="screen" id="survey">
    <div class="survey-header">
      <div class="survey-top">
        <span class="survey-count" id="q-count">1 / 20</span>
        <span class="survey-label" id="q-category-label">여행 페이스</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:5%"></div>
      </div>
    </div>
    <div class="survey-body" id="survey-body"></div>
    <div class="survey-footer">
      <button class="btn-primary" id="next-btn" onclick="nextQuestion()" disabled>다음</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="result">
    <div class="result-header">
      <div class="result-icon">🎉</div>
      <div class="result-title">취향 조사 완료!</div>
      <div class="result-sub" id="result-name-sub">결과를 확인하고 제출 버튼을 눌러줘요<br>최고의 후쿠오카 여행을 만들어볼게요 🙌</div>
    </div>
    <div class="result-body" id="result-body"></div>
    <div class="result-footer">
      <button class="btn-copy" id="submit-btn" onclick="submitResult()">📤 결과 제출하기</button>
      <button class="btn-restart" onclick="restart()">처음부터</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {

let currentQ = 0;
let answers = new Array(20).fill(null);

function showScreen(id) {
  const all = document.querySelectorAll('.screen');
  const target = document.getElementById(id);
  const current = document.querySelector('.screen.active');

  if (current && current !== target) {
    current.classList.remove('active');
    current.classList.add('exit-left');
    setTimeout(() => current.classList.remove('exit-left'), 400);
  }

  setTimeout(() => {
    target.style.transform = 'translateX(30px)';
    target.classList.add('active');
    setTimeout(() => { target.style.transform = ''; }, 10);
  }, current ? 50 : 0);
}

function startSurvey() {
  userName = document.getElementById('user-name').value.trim();
  currentQ = 0;
  answers = new Array(20).fill(null);
  renderQuestion();
  showScreen('survey');
}

function renderQuestion() {
  const q = questions[currentQ];
  const body = document.getElementById('survey-body');
  const countEl = document.getElementById('q-count');
  const catEl = document.getElementById('q-category-label');
  const progressEl = document.getElementById('progress-fill');
  const nextBtn = document.getElementById('next-btn');

  countEl.textContent = (currentQ + 1) + ' / 20';
  catEl.textContent = q.category;
  progressEl.style.width = ((currentQ + 1) / 20 * 100) + '%';
  nextBtn.textContent = currentQ === 19 ? '제출하기' : '다음';

  const saved = answers[currentQ];

  if (q.isText) {
    body.innerHTML = `
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.text.replace(/\n/g, '<br>')}</div>
      <div class="textarea-wrap">
        <textarea class="free-input" id="free-text" placeholder="예: 이치란 라멘 본점, 텐진 지하상가 전체 탐방, 야쿠인 카페 투어..." rows="5">${saved || ''}</textarea>
      </div>
    `;
    const ta = document.getElementById('free-text');
    const updateBtn = () => {
      answers[currentQ] = ta.value.trim();
      nextBtn.disabled = ta.value.trim().length === 0;
    };
    ta.addEventListener('input', updateBtn);
    nextBtn.disabled = !saved || saved.length === 0;
  } else {
    const optionsHtml = q.options.map((opt, i) => `
      <div class="option-card${saved === i ? ' selected' : ''}" onclick="selectOption(${i})">
        <span class="option-emoji">${opt.emoji}</span>
        <span class="option-text">${opt.text}</span>
        <div class="option-radio"></div>
      </div>
    `).join('');

    body.innerHTML = `
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.text}</div>
      <div class="options-grid">${optionsHtml}</div>
    `;
    nextBtn.disabled = saved === null;
  }

  body.scrollTop = 0;
}

function selectOption(idx) {
  const q = questions[currentQ];
  if (q.isText) return;
  answers[currentQ] = idx;
  document.querySelectorAll('.option-card').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (document.getElementById('next-btn').disabled) return;

  const q = questions[currentQ];
  if (q.isText) {
    const ta = document.getElementById('free-text');
    if (ta) answers[currentQ] = ta.value.trim();
  }

  if (currentQ < 19) {
    currentQ++;
    animateQuestion();
  } else {
    showResult();
  }
}

function animateQuestion() {
  const body = document.getElementById('survey-body');
  body.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
  body.style.opacity = '0';
  body.style.transform = 'translateX(-20px)';

  setTimeout(() => {
    renderQuestion();
    body.style.transition = 'none';
    body.style.transform = 'translateX(20px)';
    body.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        body.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
        body.style.opacity = '1';
        body.style.transform = 'translateX(0)';
      });
    });
  }, 180);
}

const sectionTitles = [
  { range: [0,3], title: "🗓️ 여행 페이스 & 일정 강도" },
  { range: [4,9], title: "🍜 음식 취향 & 식사 스타일" },
  { range: [10,15], title: "🛍️ 쇼핑 & 가고 싶은 곳" },
  { range: [16,19], title: "💰 경비 & 기타" },
];

function showResult() {
  const body = document.getElementById('result-body');
  let html = '';
  let copyText = '✈️ 류현민과 응급조치 후쿠오카 여행 취향 조사 결과\n8월 2일~4일\n\n';

  sectionTitles.forEach(section => {
    const [start, end] = section.range;
    html += `<div class="result-section">
      <div class="result-section-title">${section.title}</div>
      <div class="result-card">`;
    copyText += `${section.title}\n`;

    for (let i = start; i <= end; i++) {
      const q = questions[i];
      const ans = answers[i];
      let ansText = '';

      if (q.isText) {
        ansText = (ans && ans.length > 0) ? ans : '(미입력)';
      } else {
        ansText = ans !== null ? `${q.options[ans].emoji} ${q.options[ans].text}` : '(미선택)';
      }

      const shortQ = q.text.length > 30 ? q.text.substring(0, 30) + '…' : q.text;
      html += `<div class="result-item">
        <div class="result-q">Q${i+1}. ${shortQ}</div>
        <div class="result-a">${ansText}</div>
      </div>`;
      copyText += `Q${i+1}. ${shortQ.replace(/\n/g,' ')}\n→ ${q.isText ? ansText : (q.options[ans]?.emoji + ' ' + q.options[ans]?.text)}\n`;
    }

    html += `</div></div>`;
    copyText += '\n';
  });

  copyText += '카톡방에서 확인 부탁해요 🙏';
  body.innerHTML = html;
  body.dataset.copyText = copyText;
  const nameSub = document.getElementById('result-name-sub');
  if (nameSub && userName) nameSub.innerHTML = `<strong>${userName}</strong>님의 결과예요! 아래 버튼으로 제출해줘요 🙌`;
  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) { submitBtn.textContent = '📤 결과 제출하기'; submitBtn.disabled = false; submitBtn.style.background = ''; }
  showScreen('result');
}

function copyResult() {
  const text = document.getElementById('result-body').dataset.copyText;
  const btn = document.getElementById('copy-btn');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ 복사 완료!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 결과 복사하기';
        btn.classList.remove('copied');
      }, 2500);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = '✅ 복사 완료!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 결과 복사하기';
      btn.classList.remove('copied');
    }, 2500);
  }
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzQMHvTadH9I6DFoir_cjWle9RBTIsaA-IgMDF97F6Hd2snJoIYGA0MroLw_4gc1RMDJA/exec';
let userName = '';

function restart() {
  currentQ = 0;
  answers = new Array(20).fill(null);
  userName = '';
  const nameInput = document.getElementById('user-name');
  if (nameInput) nameInput.value = '';
  const startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.disabled = true;
  showScreen('intro');
}

async function submitResult() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '전송 중...';

  const q = questions[currentQ];
  if (q && q.isText) {
    const ta = document.getElementById('free-text');
    if (ta) answers[currentQ] = ta.value.trim();
  }

  const answerTexts = answers.map((ans, i) => {
    const q = questions[i];
    if (q.isText) return ans || '(미입력)';
    return ans !== null ? q.options[ans].emoji + ' ' + q.options[ans].text : '(미선택)';
  });

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: userName, answers: answerTexts })
    });
    btn.textContent = '✅ 제출 완료!';
    btn.style.background = '#4CAF50';
  } catch(e) {
    btn.textContent = '⚠️ 다시 시도';
    btn.disabled = false;
    btn.style.background = '';
  }
}
